<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sort an item — Trash Detector Sorter</title>
    <link rel="icon" type="image/webp" href="{{ url_for('static', filename='img/earth.webp') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/earth.webp') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <h1>Sort an item</h1>
        <p class="subtitle">Take or upload a photo of the item you want to throw out.</p>

        <form id="upload-form">
            <div class="photo-buttons">
                <button type="button" id="camera-btn">&#128247; Take photo</button>
                <button type="button" id="upload-btn">&#128444;&#65039; Upload photo</button>
            </div>
            <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
            <input type="file" id="file-input" accept="image/*" hidden>

            <div id="camera-view" class="camera-view" hidden>
                <video id="camera-stream" autoplay playsinline muted></video>
                <div class="camera-controls">
                    <button type="button" id="capture-btn">Capture</button>
                    <button type="button" id="cancel-camera-btn">Cancel</button>
                </div>
            </div>

            <div class="drop-zone" id="drop-zone">
                <img id="preview" alt="Preview" hidden>
                <span id="drop-zone-text">&hellip;or drag &amp; drop a photo here</span>
            </div>

            <button type="submit" id="classify-btn" class="primary-btn" disabled>Sort it</button>
        </form>

        <p id="error" class="error" hidden></p>

        <section id="results">
            <p id="overall-summary" class="overall-summary" hidden></p>
            <div id="results-list"></div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='sort.js') }}"></script>
</body>
</html>
