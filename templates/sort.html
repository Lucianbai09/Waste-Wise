<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Wise — sort an item</title>
    <link rel="icon" type="image/webp" href="{{ url_for('static', filename='img/earth.webp') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/earth.webp') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="sort">
    <main class="sort-page">
        <a class="logo" href="/">WASTEWISE</a>

        <div class="sort-columns">
            <div class="sort-left">
                <button type="button" id="camera-btn" class="pill-btn">
                    Capture a photo
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                </button>
                <button type="button" id="upload-btn" class="pill-btn">
                    Upload a photo
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                </button>
                <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
                <input type="file" id="file-input" accept="image/*" hidden>

                <div id="camera-view" class="camera-view" hidden>
                    <video id="camera-stream" autoplay playsinline muted></video>
                    <div class="camera-controls">
                        <button type="button" id="capture-btn">Capture</button>
                        <button type="button" id="cancel-camera-btn">Cancel</button>
                    </div>
                </div>

                <div class="drop-zone" id="drop-zone">
                    <img id="preview" alt="Preview" hidden>
                    <span id="drop-zone-text">&hellip;or drag &amp; drop a photo here!</span>
                </div>
            </div>

            <section class="sort-right">
                <p id="panel-hint" class="panel-hint">Take / upload a photo</p>
                <p id="overall-summary" class="overall-summary" hidden></p>
                <div id="results-list" hidden></div>
                <p id="error" class="error" hidden></p>
            </section>
        </div>
    </main>

    <script src="{{ url_for('static', filename='sort.js') }}"></script>
</body>
</html>
