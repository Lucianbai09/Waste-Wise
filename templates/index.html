<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trash Detector Sorter</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x267B;&#xFE0F;</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <h1>Trash Detector Sorter</h1>
        <p class="subtitle">Snap a photo of an item and find out which bin it goes in — based on City of Toronto rules.</p>

        <form id="upload-form">
            <div class="photo-buttons">
                <button type="button" id="camera-btn">&#128247; Take photo</button>
                <button type="button" id="upload-btn">&#128444;&#65039; Upload photo</button>
            </div>
            <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
            <input type="file" id="file-input" accept="image/*" hidden>

            <div id="camera-view" class="camera-view" hidden>
                <video id="camera-stream" autoplay playsinline muted></video>
                <div class="camera-controls">
                    <button type="button" id="capture-btn">Capture</button>
                    <button type="button" id="cancel-camera-btn">Cancel</button>
                </div>
            </div>

            <div class="drop-zone" id="drop-zone">
                <img id="preview" alt="Preview" hidden>
                <span id="drop-zone-text">&hellip;or drag &amp; drop a photo here</span>
            </div>

            <button type="submit" id="classify-btn" disabled>Sort it</button>
        </form>

        <section id="results" hidden>
            <p id="overall-summary" class="overall-summary" hidden></p>
            <div id="results-list"></div>
        </section>

        <p id="error" class="error" hidden></p>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
